repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ["--verbose"]

  - repo: local
    hooks:
      - id: enforce-folder-structure
        name: Enforce soul.md Folder Structure
        entry: bash scripts/check_structure.sh
        language: system
        pass_filenames: false

      - id: no-env-files
        name: Block .env file commits
        entry: bash -c 'git diff --cached --name-only | grep -E "^\.env" && echo "ERROR: Do not commit .env files — they contain secrets!" && exit 1 || exit 0'
        language: system
        pass_filenames: false
